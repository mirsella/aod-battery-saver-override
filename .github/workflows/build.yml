name: Build

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build debug and release APKs
        run: |
          ./gradlew assembleDebug assembleRelease
          mkdir -p dist
          cp app/build/outputs/apk/debug/app-debug.apk dist/aod-battery-saver-override-debug.apk
          cp app/build/outputs/apk/release/app-release.apk dist/aod-battery-saver-override-release.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: aod-battery-saver-override-apks
          path: dist/*.apk
          if-no-files-found: error
